<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/admin.css">
  <title>Layout Editor — Wall Assistant</title>
</head>
<body>
  <header class="admin-header">
    <h1>Wall Assistant &mdash; Layout Editor</h1>
    <div class="admin-controls">
      <div class="control-group">
        <label for="cols-input">Cols</label>
        <input type="number" id="cols-input" min="1" max="6" value="2">
      </div>
      <div class="control-group">
        <label for="rows-input">Rows</label>
        <input type="number" id="rows-input" min="1" max="6" value="2">
      </div>
      <div class="control-group">
        <label for="col-sizes-input">Col Widths</label>
        <input type="text" id="col-sizes-input" value="1, 1" placeholder="1, 2, 1" title="Relative widths, comma-separated (e.g. 2, 1)">
      </div>
      <div class="control-group">
        <label for="row-sizes-input">Row Heights</label>
        <input type="text" id="row-sizes-input" value="1, 1" placeholder="1, 2" title="Relative heights, comma-separated (e.g. 1, 2)">
      </div>
      <button class="btn btn-secondary" id="export-btn">Export</button>
      <button class="btn btn-secondary" id="import-btn">Import</button>
      <button class="btn btn-secondary" id="reset-btn">Reset</button>
      <button class="btn btn-primary" id="save-btn">Save Layout</button>
    </div>
  </header>

  <div class="layout-modal-overlay" id="layout-modal" hidden>
    <div class="layout-modal">
      <div class="layout-modal-header">
        <h3 id="modal-title">Import Layout</h3>
        <button class="layout-modal-close" id="modal-close" aria-label="Close">&times;</button>
      </div>
      <p class="layout-modal-hint" id="modal-hint"></p>
      <textarea class="layout-modal-textarea" id="modal-textarea" spellcheck="false"></textarea>
      <div class="layout-modal-actions">
        <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
        <button class="btn btn-secondary" id="modal-copy" hidden>Copy to Clipboard</button>
        <button class="btn btn-primary"   id="modal-apply" hidden>Apply Layout</button>
      </div>
    </div>
  </div>

  <div class="admin-body">
    <div class="admin-left">
      <div class="grid-editor-wrap">
        <div class="grid-editor" id="grid-editor"></div>
      </div>
      <p class="admin-hint">Drag to swap &bull; Click to configure &bull; Spanned cells can't be dragged</p>
    </div>
    <aside class="admin-right">
      <h2>Cell Configuration</h2>
      <div id="config-content">
        <div class="config-placeholder">Click a cell to configure it</div>
      </div>
      <div class="devices-panel">
        <h2>Connected Devices</h2>
        <div id="devices-list"><div class="devices-placeholder">Loading&hellip;</div></div>
      </div>
      <div class="devices-panel">
        <h2>Server Settings</h2>
        <div class="server-setting-row">
          <label for="update-interval-input">WS Update Interval</label>
          <div class="server-setting-controls">
            <input type="number" id="update-interval-input" min="1000" max="60000" step="500" value="3000">
            <span class="server-setting-unit">ms</span>
            <button class="btn btn-primary btn-sm" id="save-interval-btn">Apply</button>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <div class="notification" id="notification" aria-live="polite"></div>

  <script src="js/admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Home">
  <!-- Replace icons/icon-180.png with your own 180x180 PNG app icon -->
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/main.css">
  <title>Home</title>
</head>
<body>
  <div class="grid" id="grid"></div>

  <!-- Full-screen camera expand overlay — singleton outside the grid -->
  <div class="camera-expand-overlay" id="camera-overlay">
    <img class="camera-expand-img" id="camera-overlay-img" src="" alt="">
    <div class="camera-expand-label" id="camera-overlay-label"></div>
    <button class="camera-expand-close" id="camera-overlay-close" aria-label="Close">&#x2715;</button>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
